<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Call test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 845px; height: 314px;
    background: #0a0808;
    overflow: hidden;
    font-family: 'Bebas Neue', Impact, sans-serif;
  }
  .stage {
    width: 845px; height: 314px;
    display: flex; align-items: center; justify-content: center;
    background:
      linear-gradient(105deg, #a30620 0%, rgba(163,6,32,0) 38%),
      radial-gradient(120% 80% at 30% 50%, #1a0608 0%, #0a0808 60%, #060404 100%);
  }
  .row { display: flex; align-items: baseline; gap: 24px; animation: pulse 1.6s ease-in-out infinite; }
  .word {
    font-size: 180px;
    line-height: 0.85;
    letter-spacing: -0.005em;
    white-space: nowrap;
  }
  .last { color: #f5efe6; text-shadow: 4px 6px 0 #a30620, 0 0 40px rgba(227,8,43,0.5); }
  .call { color: transparent; -webkit-text-stroke: 3px #f5efe6; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.025); }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="row">
    <div class="word last">LAST</div>
    <div class="word call">CALL</div>
  </div>
</div>
</body>
</html>
