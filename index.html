<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=845, initial-scale=1.0">
<title>Ad Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 845px; height: 314px; overflow: hidden; background: #000; }
  #player { position: relative; width: 845px; height: 314px; background: #000; }
  .slide {
    position: absolute; top: 0; left: 0;
    width: 845px; height: 314px;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }
  .slide.visible { opacity: 1; }
  .slide img { width: 845px; height: 314px; object-fit: cover; display: block; }
  .slide video { width: 845px; height: 314px; object-fit: cover; display: block; background: #000; }
  #error { display: none; color: #fff; font-family: sans-serif; font-size: 14px; text-align: center; padding-top: 140px; }

  /* ─── Last Call popup (preloaded iframe overlay) ───────── */
  #last-call-popup {
    position: fixed; top: 0; left: 0;
    width: 845px; height: 314px;
    background: #0a0808;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease-in-out;
    overflow: hidden;
  }
  #last-call-popup.show { opacity: 1; }
  #last-call-popup .lc-fit { position: absolute; }
  #last-call-popup iframe { border: 0; display: block; background: #0a0808; }
</style>
</head>
<body>
<div id="player">
  <div id="error">Could not load ads.json</div>
</div>
<script>
var ADS_FOLDER = "ads/";
var DEFAULT_IMAGE_DURATION = 10;
var LOAD_TIMEOUT_MS = 8000;
var PRELOAD_AHEAD = 2;

// --- Reconnect / watchdog settings ---
var WATCHDOG_INTERVAL    = 10000;
var WATCHDOG_MAX_STUCK   = 30000;
var HARD_RELOAD_INTERVAL = 4 * 60 * 60 * 1000;

var ADS_JSON_CACHE_BUCKET_SECONDS = 60;

// ─── Last Call popup settings ───────────────────────────────
var LAST_CALL_HOUR        = 19;            // 7 PM
var LAST_CALL_MINUTE      = 25;            // :25
var LAST_CALL_PRELOAD_MIN = 24;            // preload at :24
var LAST_CALL_DURATION    = 2 * 60 * 1000; // 2 minutes
var LAST_CALL_DAYS        = [2, 3, 4, 5, 6]; // Tue=2 ... Sat=6
var LAST_CALL_AD_URL      =
  "https://pub-d884496adff243c08bda3301b36cb50f.r2.dev/Screen%20ad%20Baseline/Last%20Call.html";

// Native design canvas of the ad (already built at 845x314)
var LAST_CALL_AD_W        = 845;
var LAST_CALL_AD_H        = 314;
var LAST_CALL_FIT         = "contain"; // "contain" (letterbox) or "cover" (crop)

var lastCallPreloadedKey = null;
var lastCallShownKey     = null;
var lastCallOverlay      = null;
var lastCallDismissTimer = null;

var player = document.getElementById("player");
var errorEl = document.getElementById("error");

var adList = [];
var currentEl = null;
var advanceTimer = null;
var loadTimer = null;
var cycleLength = 0;
var offsets = [];
var imageCache = {};

var lastAdvanceTime = Date.now();
var watchdogTimer = null;

var lastAdsJson = null;

function isVideo(f) { return /\.(mp4|webm)$/i.test(f); }

function getSlotDuration(item) {
  if (item.rotate) return item.duration || DEFAULT_IMAGE_DURATION;
  return isVideo(item.file)
    ? (item.duration || 30)
    : (item.duration || DEFAULT_IMAGE_DURATION);
}

function getRotateFile(item) {
  var now = Math.floor(Date.now() / 1000);
  var totalCycles = Math.floor(now / cycleLength);
  var pick = totalCycles % item.files.length;
  return item.files[pick];
}

function resolveFile(item) {
  return item.rotate ? getRotateFile(item) : item.file;
}

function buildOffsets() {
  cycleLength = 0;
  offsets = [];
  for (var i = 0; i < adList.length; i++) {
    offsets.push(cycleLength);
    cycleLength += getSlotDuration(adList[i]);
  }
}

function getCurrentIndex() {
  var pos = Math.floor(Date.now() / 1000) % cycleLength;
  var idx = 0;
  for (var i = offsets.length - 1; i >= 0; i--) {
    if (pos >= offsets[i]) { idx = i; break; }
  }
  return idx;
}

function getMsRemaining(index) {
  var pos = Math.floor(Date.now() / 1000) % cycleLength;
  var dur = getSlotDuration(adList[index]);
  var elapsed = pos - offsets[index];
  return Math.max((dur - elapsed) * 1000, 500);
}

function clearTimers() {
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  if (loadTimer)    { clearTimeout(loadTimer);    loadTimer = null; }
}

function forceRecovery(reason) {
  console.warn("Recovery triggered:", reason);
  clearTimers();
  if (currentEl) {
    var oldVid = currentEl.querySelector("video");
    if (oldVid) { oldVid.pause(); oldVid.removeAttribute("src"); oldVid.load(); }
    currentEl.remove();
    currentEl = null;
  }
  lastAdvanceTime = Date.now();
  checkAndAdvance();
}

function startWatchdog() {
  if (watchdogTimer) clearInterval(watchdogTimer);
  watchdogTimer = setInterval(function() {
    var stuck = Date.now() - lastAdvanceTime;
    if (stuck > WATCHDOG_MAX_STUCK) {
      forceRecovery("stuck for " + Math.round(stuck / 1000) + "s");
    }
  }, WATCHDOG_INTERVAL);
}

document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible" && adList.length) {
    console.log("Tab became visible — re-syncing");
    forceRecovery("visibilitychange");
  }
});

setTimeout(function() {
  console.log("Scheduled soft refresh of ads.json");
  refreshAdsJson();
}, HARD_RELOAD_INTERVAL);

setInterval(function() {
  if (!adList.length) return;
  var stuck = Date.now() - lastAdvanceTime;
  if (stuck > 45000) {
    forceRecovery("heartbeat secondary check");
  }
}, 15000);

function preloadUpcoming(currentIndex) {
  for (var i = 1; i <= PRELOAD_AHEAD; i++) {
    var nextIdx = (currentIndex + i) % adList.length;
    var file = resolveFile(adList[nextIdx]);
    if (!imageCache[file] && !isVideo(file)) {
      var img = new Image();
      img.src = ADS_FOLDER + encodeURIComponent(file);
      imageCache[file] = img;
    }
  }
}

function getOrLoadImage(file, onLoad, onError) {
  var src = ADS_FOLDER + encodeURIComponent(file);
  if (imageCache[file] && imageCache[file].complete && imageCache[file].naturalWidth > 0) {
    onLoad(imageCache[file]);
    return;
  }
  var img = imageCache[file] || new Image();
  imageCache[file] = img;
  img.onload = function() { onLoad(img); };
  img.onerror = function() { delete imageCache[file]; onError(); };
  if (!img.src) img.src = src;
}

function showSlide(index) {
  clearTimers();
  lastAdvanceTime = Date.now();

  var item = adList[index];
  var file = resolveFile(item);

  if (isVideo(file)) {
    if (currentEl) {
      var oldVid = currentEl.querySelector("video");
      if (oldVid) { oldVid.pause(); oldVid.removeAttribute("src"); oldVid.load(); }
      currentEl.remove();
      currentEl = null;
    }

    var div = document.createElement("div");
    div.className = "slide";
    var vid = document.createElement("video");
    vid.src = ADS_FOLDER + encodeURIComponent(file);
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = "auto";

    var vidLoadTimer = setTimeout(function() {
      console.warn("Video load timeout:", file);
      checkAndAdvance();
    }, LOAD_TIMEOUT_MS);

    vid.addEventListener("canplay", function() {
      clearTimeout(vidLoadTimer);
      div.classList.add("visible");
      vid.play().catch(function() { checkAndAdvance(); });
    });
    vid.addEventListener("ended", checkAndAdvance);
    vid.addEventListener("error", function() {
      clearTimeout(vidLoadTimer);
      console.warn("Video error:", file);
      checkAndAdvance();
    });

    div.appendChild(vid);
    player.appendChild(div);
    currentEl = div;
    preloadUpcoming(index);
    advanceTimer = setTimeout(checkAndAdvance, getMsRemaining(index) + 500);

  } else {
    loadTimer = setTimeout(function() {
      console.warn("Image load timeout:", file);
      delete imageCache[file];
      checkAndAdvance();
    }, LOAD_TIMEOUT_MS);

    getOrLoadImage(file,
      function(img) {
        clearTimeout(loadTimer);
        loadTimer = null;

        var div = document.createElement("div");
        div.className = "slide";
        var imgEl = document.createElement("img");
        imgEl.src = img.src;
        div.appendChild(imgEl);
        player.appendChild(div);

        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            div.classList.add("visible");
          });
        });

        if (currentEl) {
          var old = currentEl;
          setTimeout(function() {
            old.classList.remove("visible");
            setTimeout(function() { old.remove(); }, 350);
          }, 50);
        }

        currentEl = div;
        preloadUpcoming(index);
        advanceTimer = setTimeout(checkAndAdvance, getMsRemaining(index));
      },
      function() {
        clearTimeout(loadTimer);
        loadTimer = null;
        console.warn("Image error:", file);
        advanceTimer = setTimeout(checkAndAdvance, 500);
      }
    );
  }
}

function checkAndAdvance() {
  clearTimers();
  showSlide(getCurrentIndex());
}

// ─── Last Call popup ───────────────────────────────────────────
function buildLastCallOverlay() {
  var overlay = document.createElement("div");
  overlay.id = "last-call-popup";

  // Scale the design canvas to fit 845x314
  var sx = 845 / LAST_CALL_AD_W;
  var sy = 314 / LAST_CALL_AD_H;
  var scale = LAST_CALL_FIT === "cover" ? Math.max(sx, sy) : Math.min(sx, sy);
  var sw = LAST_CALL_AD_W * scale;
  var sh = LAST_CALL_AD_H * scale;

  var fit = document.createElement("div");
  fit.className = "lc-fit";
  fit.style.width  = LAST_CALL_AD_W + "px";
  fit.style.height = LAST_CALL_AD_H + "px";
  fit.style.transform = "scale(" + scale + ")";
  fit.style.transformOrigin = "top left";
  fit.style.left = ((845 - sw) / 2) + "px";
  fit.style.top  = ((314 - sh) / 2) + "px";

  var iframe = document.createElement("iframe");
  iframe.src = LAST_CALL_AD_URL;
  iframe.setAttribute("scrolling", "no");
  iframe.style.width  = LAST_CALL_AD_W + "px";
  iframe.style.height = LAST_CALL_AD_H + "px";

  fit.appendChild(iframe);
  overlay.appendChild(fit);
  document.body.appendChild(overlay);
  return overlay;
}

function preloadLastCall() {
  if (lastCallOverlay) return;
  lastCallOverlay = buildLastCallOverlay();
  console.log("Last Call preloaded");
}

function revealLastCall() {
  if (!lastCallOverlay) preloadLastCall();
  setTimeout(function() {
    if (!lastCallOverlay) return;
    lastCallOverlay.classList.add("show");
    if (lastCallDismissTimer) clearTimeout(lastCallDismissTimer);
    lastCallDismissTimer = setTimeout(dismissLastCall, LAST_CALL_DURATION);
  }, 50);
}

function dismissLastCall() {
  if (lastCallDismissTimer) { clearTimeout(lastCallDismissTimer); lastCallDismissTimer = null; }
  var el = lastCallOverlay;
  if (!el) return;
  el.classList.remove("show");
  setTimeout(function() {
    if (el.parentNode) el.remove();
    if (lastCallOverlay === el) lastCallOverlay = null;
  }, 500);
}

function checkLastCallSchedule() {
  var now = new Date();
  if (LAST_CALL_DAYS.indexOf(now.getDay()) === -1) return;
  if (now.getHours() !== LAST_CALL_HOUR) return;
  var key = now.toDateString();
  var m = now.getMinutes();

  if (m === LAST_CALL_PRELOAD_MIN && lastCallPreloadedKey !== key) {
    lastCallPreloadedKey = key;
    preloadLastCall();
    return;
  }

  if (m === LAST_CALL_MINUTE && lastCallShownKey !== key) {
    lastCallShownKey = key;
    revealLastCall();
  }
}
setInterval(checkLastCallSchedule, 10000); // poll every 10s

// ─── Test toggle: press "t" to show/hide the Last Call popup ──
document.addEventListener("keydown", function(e) {
  if (e.key !== "t" && e.key !== "T") return;
  if (lastCallOverlay && lastCallOverlay.classList.contains("show")) {
    dismissLastCall();
  } else if (lastCallOverlay) {
    revealLastCall();
  } else {
    preloadLastCall();
    setTimeout(revealLastCall, 2500); // let React + Babel boot
  }
});

// ─── ads.json fetch ───────────────────────────────────────────
function getAdsCacheKey() {
  return Math.floor(Date.now() / (ADS_JSON_CACHE_BUCKET_SECONDS * 1000));
}

function refreshAdsJson() {
  fetch("ads/ads.json?v=" + getAdsCacheKey())
    .then(function(r) { if (!r.ok) throw new Error("not found"); return r.json(); })
    .then(function(data) {
      if (!data.ads || !data.ads.length) return;
      var newJson = JSON.stringify(data.ads);
      if (newJson === lastAdsJson) {
        console.log("ads.json unchanged, skipping rebuild");
        return;
      }
      console.log("ads.json changed, rebuilding");
      lastAdsJson = newJson;
      adList = data.ads;
      buildOffsets();
      var activeFiles = {};
      adList.forEach(function(ad) {
        var files = ad.rotate ? ad.files : [ad.file];
        files.forEach(function(f) { activeFiles[f] = true; });
      });
      Object.keys(imageCache).forEach(function(f) {
        if (!activeFiles[f]) delete imageCache[f];
      });
    })
    .catch(function(err) {
      console.warn("ads.json refresh failed (non-fatal):", err);
    });
}

function loadAds() {
  fetch("ads/ads.json?v=" + getAdsCacheKey())
    .then(function(r) { if (!r.ok) throw new Error("not found"); return r.json(); })
    .then(function(data) {
      if (!data.ads || !data.ads.length) throw new Error("empty");
      lastAdsJson = JSON.stringify(data.ads);
      adList = data.ads;
      buildOffsets();
      errorEl.style.display = "none";

      var started = false;
      function tryStart() {
        if (started) return;
        started = true;
        var msUntilNextSecond = 1000 - (Date.now() % 1000);
        setTimeout(function() {
          checkAndAdvance();
          startWatchdog();
        }, msUntilNextSecond);
      }

      var loaded = 0;
      adList.forEach(function(ad, i) {
        var file = resolveFile(ad);
        if (isVideo(file)) { loaded++; if (loaded === adList.length) tryStart(); return; }
        var img = new Image();
        img.onload = img.onerror = function() {
          loaded++;
          if (i === getCurrentIndex() || loaded === adList.length) tryStart();
        };
        img.src = ADS_FOLDER + encodeURIComponent(file);
        imageCache[file] = img;
      });

      setTimeout(tryStart, 3000);
    })
    .catch(function(err) {
      console.error("ads.json load failed:", err);
      errorEl.style.display = "block";
      var retryDelay = (loadAds._retryDelay = Math.min((loadAds._retryDelay || 15000) * 2, 60000));
      console.log("Retrying ads.json in " + retryDelay / 1000 + "s");
      setTimeout(loadAds, retryDelay);
    });
}

loadAds();
</script>
</body>
</html>
